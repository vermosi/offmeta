<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="google-site-verification" content="BFbOUBW-CLUbLmfgd3BS6GYFS2tLjT0hCgdkFY-cH3o" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="impact-site-verification"
      value="e16a5db3-241c-490f-a97b-cc87331a15fa"
    />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/offmeta-logo.png" />
    <link rel="apple-touch-icon" href="/offmeta-logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <title>Natural Language MTG Card Search | OffMeta</title>
    <meta
      name="description"
      content="Search Magic: The Gathering cards in plain English. Type what you mean — 'cheap green ramp', 'commander wipes under $5' — and get real Scryfall results."
    />
    <meta name="author" content="OffMeta" />
    <meta
      name="keywords"
      content="magic card search engine, MTG natural language search, Magic The Gathering search, MTG card search, Scryfall natural language, Commander card search, EDH card finder, MTG keywords search"
    />
    <!--
      No hardcoded <link rel="canonical"> or hreflang tags here.
      Per-route Helmet-style code in src/lib/seo.ts (applySeoMeta) sets the
      canonical + og:url for each page after mount. A hardcoded homepage
      canonical in the static shell was causing non-JS social crawlers
      (Reddit, Discord, Slack, LinkedIn, Twitter card bot) to attribute
      every /cards/*, /search/*, /guides/*, /ai/* URL to the homepage, and
      was a strong initial-HTML signal to Googlebot that conflicted with
      the JS-rendered per-route canonical.

      hreflang self-references pointing at "/" for every language were
      actively harmful for non-homepage URLs — omit them until per-route
      hreflang can be emitted with a real localized href.
    -->

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Preload critical font files to break the dependency chain -->
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/inter/v20/UcC73FwrK3iLTeHuS_nVMrMxCp50SjIa1ZL7W0Q5nw.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="https://fonts.gstatic.com/s/spacegrotesk/v22/V8mDoQDjQSkFtoMM3T6r8E7mPbF4C_k3HqU.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Non-render-blocking font loading -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- DNS prefetch for external APIs -->
    <link rel="dns-prefetch" href="https://api.scryfall.com" />
    <link rel="preconnect" href="https://cards.scryfall.io" crossorigin />
    <link rel="dns-prefetch" href="https://cards.scryfall.io" />
    <link
      rel="preconnect"
      href="https://nxmzyykkzwomkcentctt.supabase.co"
      crossorigin
    />
    <link rel="dns-prefetch" href="https://nxmzyykkzwomkcentctt.supabase.co" />

    <!-- Open Graph (homepage defaults; per-route pages override og:url/title/desc via applySeoMeta) -->
    <meta property="og:type" content="website" />
    <meta
      property="og:title"
      content="Magic Card Search Engine — Natural Language MTG | OffMeta"
    />
    <meta
      property="og:description"
      content="The natural language Magic card search engine. Type what you mean and get real Scryfall results — no syntax needed."
    />
    <meta
      property="og:image"
      content="https://offmeta.app/og-image.png"
    />
    <meta property="og:site_name" content="OffMeta" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter/X Card (per-route pages override twitter:url/title/desc via applySeoMeta) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Magic Card Search Engine — Natural Language MTG | OffMeta"
    />
    <meta
      name="twitter:description"
      content="The natural language MTG card search engine. No Scryfall syntax needed."
    />
    <meta
      name="twitter:image"
      content="https://offmeta.app/og-image.png"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "OffMeta",
        "url": "https://offmeta.app/",
        "description": "Natural language search translator for Magic: The Gathering cards. Describe what you need in plain English and get real card results from Scryfall.",
        "applicationCategory": "UtilitiesApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "browserRequirements": "Requires JavaScript",
        "author": {
          "@type": "Organization",
          "name": "OffMeta"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OffMeta",
        "url": "https://offmeta.app/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://offmeta.app/search/{search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is OffMeta?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "OffMeta is a natural language search tool for Magic: The Gathering cards. Instead of learning complex Scryfall syntax, you can describe what you're looking for in plain English and OffMeta translates it into a valid search query."
            }
          },
          {
            "@type": "Question",
            "name": "How does natural language MTG card search work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "OffMeta uses AI to understand your search intent and converts it into Scryfall search syntax. For example, typing 'cheap green ramp spells' becomes a proper query filtering by color, card type, mana cost, and oracle text for mana-producing effects."
            }
          },
          {
            "@type": "Question",
            "name": "Is OffMeta free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, OffMeta is completely free to use. There are no accounts required, no subscriptions, and no limits on searches."
            }
          },
          {
            "@type": "Question",
            "name": "Where does OffMeta get its card data?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "OffMeta uses the Scryfall API as its data source. Scryfall maintains a comprehensive, up-to-date database of all Magic: The Gathering cards including oracle text, prices, legalities, and card images."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use OffMeta to search for Commander/EDH cards?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! You can search for cards legal in any format including Commander, Standard, Modern, Legacy, and more. Simply mention the format in your search like 'commander legal board wipes under $5' or use the format filter chips."
            }
          }
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to Search for MTG Cards with Natural Language",
        "description": "Learn how to use OffMeta to find Magic: The Gathering cards by describing what you need in plain English, without learning Scryfall syntax.",
        "totalTime": "PT1M",
        "step": [
          {
            "@type": "HowToStep",
            "position": 1,
            "name": "Describe what you're looking for",
            "text": "Type a natural language description of the cards you want to find. For example: 'green creatures that ramp' or 'board wipes under $5 for commander'."
          },
          {
            "@type": "HowToStep",
            "position": 2,
            "name": "Review the translation",
            "text": "OffMeta shows you the Scryfall query it generated from your description. You can see exactly what syntax was used and edit it if needed."
          },
          {
            "@type": "HowToStep",
            "position": 3,
            "name": "Browse your results",
            "text": "Scroll through the matching cards. Click any card to see full details including oracle text, prices, legalities, and all printings."
          },
          {
            "@type": "HowToStep",
            "position": 4,
            "name": "Refine with filters",
            "text": "Use the filter chips to narrow results by color, format, card type, mana cost, price, or rarity without rewriting your search."
          }
        ]
      }
    </script>

    <!-- Critical inline CSS: prevents render-blocking on the main stylesheet -->
    <style>
      html, body { overscroll-behavior-y: contain; margin: 0; }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Dark mode default (matches .dark tokens) */
      :root {
        --bg: hsl(270 45% 6%);
        --fg: hsl(270 20% 95%);
        --mfg: hsl(270 20% 65%);
        --gs: 300 90% 60%;
        --ge: 195 95% 55%;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --bg: hsl(270 30% 98%);
          --fg: hsl(270 50% 15%);
          --mfg: hsl(270 15% 45%);
          --gs: 300 85% 55%;
          --ge: 195 90% 55%;
        }
      }
      /* Minimal pre-hydration shell — only paints the background so users
         never see a different-looking "interim" homepage. The real
         HeroSection (with backdrop, CTAs, animated headline) mounts on top
         immediately after. */
      .shell {
        position: fixed; inset: 0;
        background: var(--bg);
        z-index: 0;
        pointer-events: none;
      }
      /* Removed once React mounts (see src/main.tsx). */
    </style>
  </head>

  <body>
    <!-- Static indexable content for SEO crawlers (visible but subtle) -->
    <div
      id="seo-content"
      style="
        position: absolute;
        left: -9999px;
        width: 1px;
        height: 1px;
        overflow: hidden;
      "
    >
      <h1>OffMeta — Natural Language Magic Card Search</h1>
      <p>
        OffMeta is a natural language Magic: The Gathering card search tool. It
        lets players describe cards the way they talk and translates that into
        real Scryfall searches. No syntax knowledge required.
      </p>
    </div>

    <!-- Fallback for JavaScript-disabled browsers -->
    <noscript>
      <div style="padding: 2rem; font-family: system-ui, sans-serif">
        <h1>OffMeta — Natural Language Magic Card Search</h1>
        <p>
          OffMeta is a natural language Magic: The Gathering card search tool.
          It lets players describe cards the way they talk and translates that
          into real Scryfall searches. No syntax knowledge required.
        </p>
        <h2>How it works</h2>
        <ul>
          <li>
            Type what you're looking for: "cheap green ramp spells" or
            "creatures that make treasure tokens"
          </li>
          <li>OffMeta translates your description into Scryfall syntax</li>
          <li>See real card results instantly from Scryfall's database</li>
        </ul>
        <p>Please enable JavaScript to use OffMeta.</p>
      </div>
    </noscript>

    <!-- Pre-hydration background placeholder (no text — avoids a flash of
         different content before React renders the real HeroSection). -->
    <div class="shell" id="static-shell" aria-hidden="true"></div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
