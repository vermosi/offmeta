name: Discord - CI Status

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]

jobs:
  notify-discord:
    if: github.event.workflow_run.head_branch == github.event.repository.default_branch && (github.event.workflow_run.conclusion == 'success' || github.event.workflow_run.conclusion == 'failure')
    uses: ./.github/workflows/discord-notify.yml
    with:
      content: |-
        ${{ github.event.workflow_run.conclusion == 'success' && '[PASS] CI Passed' || '[FAIL] CI Failed' }} in `${{ github.repository }}`
        Workflow: ${{ github.event.workflow_run.name }}
        Branch: `${{ github.event.workflow_run.head_branch }}`
        Commit: `${{ github.event.workflow_run.head_sha }}`
        ${{ github.event.workflow_run.html_url }}
    secrets: inherit
