name: CI

on:
  push:
    branches: ['main']
  pull_request:
  schedule:
    - cron: '0 3 * * *' # nightly — e2e + a11y
    - cron: '0 6 * * 1' # weekly — live Scryfall validation
  workflow_dispatch:
    inputs:
      run_e2e:
        description: 'Run E2E tests (default: true)'
        required: false
        default: true
        type: boolean
      run_a11y:
        description: 'Run accessibility tests (default: true)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false # TODO: re-enable once Playwright browser cache is seeded

jobs:
  # ─── Shared setup ───────────────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - uses: actions/cache/save@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  # ─── Parallel quality gates ─────────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  typecheck:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run typecheck

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run tests with coverage
        run: npm run test -- --coverage
      - name: Upload coverage (lcov + json-summary)
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist

  # ─── Bundle size check ──────────────────────────────────────────────
  bundle-size:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Check bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY

          # Total dist size
          TOTAL_SIZE=$(du -sh dist | cut -f1)
          echo "**Total dist size:** $TOTAL_SIZE" >> $GITHUB_STEP_SUMMARY

          # JS assets gzipped size
          JS_FILES=$(find dist/assets -name '*.js' 2>/dev/null || true)
          if [ -n "$JS_FILES" ]; then
            GZIP_SIZE=0
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Raw | Gzipped |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-----|---------|" >> $GITHUB_STEP_SUMMARY
            for f in $JS_FILES; do
              RAW=$(wc -c < "$f")
              GZ=$(gzip -c "$f" | wc -c)
              RAW_KB=$((RAW / 1024))
              GZ_KB=$((GZ / 1024))
              GZIP_SIZE=$((GZIP_SIZE + GZ))
              BASENAME=$(basename "$f")
              echo "| $BASENAME | ${RAW_KB}KB | ${GZ_KB}KB |" >> $GITHUB_STEP_SUMMARY
            done

            GZIP_KB=$((GZIP_SIZE / 1024))
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Total JS gzipped:** ${GZIP_KB}KB" >> $GITHUB_STEP_SUMMARY

            # Fail if total gzipped JS exceeds 500KB
            MAX_SIZE_KB=1024
            if [ "$GZIP_KB" -gt "$MAX_SIZE_KB" ]; then
              echo "::error::JS bundle size (${GZIP_KB}KB gzipped) exceeds ${MAX_SIZE_KB}KB limit"
              exit 1
            else
              echo "✅ Bundle size OK (${GZIP_KB}KB < ${MAX_SIZE_KB}KB)" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  # ─── E2E and a11y jobs temporarily disabled until flakiness is resolved ───
  # See: https://github.com/offmeta/offmeta/issues/TBD
  # e2e-smoke, e2e, a11y-smoke, a11y jobs removed from CI

  # ─── API security tests (on-demand) ─────────────────────────────────
  api-security:
    if: github.event_name == 'workflow_dispatch'
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - uses: actions/cache/restore@v5
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Run API security tests
        env:
          RUN_API_TESTS: '1'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: npx vitest run src/tests/api/

  # ─── Live Scryfall validation (weekly) ──────────────────────────────
  live-scryfall-validation:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 6 * * 1' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Run live Scryfall validation
        env:
          RUN_SCRYFALL_LIVE_TESTS: '1'
        run: npm run test -- src/lib/scryfall-syntax-validation.test.ts src/lib/scryfall-otag-validation.test.ts

  report-ci-failure:
    if: ${{ always() && github.ref == 'refs/heads/main' }}
    needs:
      - lint
      - typecheck
      - test
      - build
      - bundle-size
    runs-on: ubuntu-latest
    steps:
      - name: Create issue when CI fails
        if: ${{ contains(needs.*.result, 'failure') }}
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.slice(0, 7);
            const title = `CI failure on main (${sha})`;
            const body = [
              'Automated CI failure report for `main`.',
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: @${context.actor}`,
              '',
              '### What to do next',
              '- [ ] Acknowledge this issue',
              '- [ ] Investigate failing job(s) in the workflow run',
              '- [ ] Link the fixing PR and close this issue',
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
              per_page: 100,
            });

            if (existing.length > 0) {
              const issue = existing[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Another CI failure detected: ${runUrl} (commit ${context.sha}).`,
              });
              core.info(`Updated existing issue #${issue.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['bug', 'area:infra', 'ci-failure'],
              });
              core.info(`Created issue #${created.data.number}`);
            }
